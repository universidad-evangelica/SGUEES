<app-barra-data-mtto
	[tituloVentana]="tituloVentana"
	[isBrowse]="isBrowse()"
	[isForm]="isForm()"
	[permiteAdd]="permiteAdd"
	(nuevo)="nuevo()"
	(guardar)="guardar()"
	(cancelar)="cancelar()"
>
</app-barra-data-mtto>
<div class="content-block dx-card responsive-paddings" *ngIf="!isBrowse()">
	<dx-form #fData id="fData" [formData]="model" [labelLocation]="'top'" [colCount]="8" [items]="items">
		<div *dxTemplate="let cellInfo of 'CORR_TIPO_CENTRO_COSTOLookup'">
			<app-data-lookup
				[model]="mCORR_TIPO_CENTRO_COSTO"
				[(value)]="model.CORR_TIPO_CENTRO_COSTO"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
		<div *dxTemplate="let cellInfo of 'ESTADO_CENTRO_COSTOLookup'">
			<app-data-lookup
				[model]="mESTADO_CENTRO_COSTO"
				[(value)]="model.ESTADO_CENTRO_COSTO"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
		<div *dxTemplate="let cellInfo of 'CORR_UNIDAD_NEGOCIOLookup'">
			<app-data-lookup
				[model]="mCORR_UNIDAD_NEGOCIO"
				[(value)]="model.CORR_UNIDAD_NEGOCIO"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
		<div *dxTemplate="let cellInfo of 'CORR_AREA_FUNCIONALLookup'">
			<app-data-lookup
				[model]="mCORR_AREA_FUNCIONAL"
				[(value)]="model.CORR_AREA_FUNCIONAL"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
		<div *dxTemplate="let cellInfo of 'CORR_EMPLEADO_JEFELookup'">
			<app-data-lookup
				[model]="mCORR_EMPLEADO_JEFE"
				[(value)]="model.CORR_EMPLEADO_JEFE"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
		<div *dxTemplate="let cellInfo of 'CORR_CLIENTELookup'">
			<app-data-lookup
				[model]="mCORR_CLIENTE"
				[(value)]="model.CORR_CLIENTE"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
	</dx-form>
</div>
<app-data-grid-mtto
	[isBrowse]="isBrowse()"
	[models]="models"
	[columns]="columns"
	[summary]="summary"
	[keyExpr]="'CORR_CENTRO_COSTO'"
	[permiteEditar]="getPermiteEditar"
	[permiteDele]="getPermiteDele"
	(rowDblClick)="rowDblClick($event)"
	(rowRemoving)="rowRemoving($event)"
	(focusedRowChanged)="focusedRowChanged($event)"
	(editClick)="editarClick($event)"
>
</app-data-grid-mtto>
<dx-load-panel
	#loadPanel
	shadingColor="rgba(0,0,0,0.4)"
	[position]="{ my: 'center', at: 'center', of: '#LoadPanel' }"
	[(visible)]="loadingVisible"
	[showIndicator]="true"
	[showPane]="true"
	[shading]="true"
	(onShown)="(loadingVisible)"
>
</dx-load-panel>
