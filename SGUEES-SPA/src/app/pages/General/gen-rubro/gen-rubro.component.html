<app-barra-data-mtto
	[tituloVentana]="tituloVentana"
	[isBrowse]="isBrowse()"
	[isForm]="isForm()"
	[permiteAdd]="permiteAdd"
	(nuevo)="nuevo()"
	(guardar)="guardar()"
	(cancelar)="cancelar()"
>
</app-barra-data-mtto>
<div class="content-block dx-card responsive-paddings" *ngIf="!isBrowse()">
	<dx-form #fData id="fData" [formData]="model" [labelLocation]="'top'" [colCount]="8" [items]="items">
		<div *dxTemplate="let cellInfo of 'CLASE_RUBROLookup'">
			<app-data-lookup
				[model]="mCLASE_RUBRO"
				[(value)]="model.CLASE_RUBRO"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
    <div *dxTemplate="let cellInfo of 'SUMA_RESTALookup'">
			<app-data-lookup
				[model]="mSUMA_RESTA"
				[(value)]="model.SUMA_RESTA"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
    <div *dxTemplate="let cellInfo of 'TIPO_APLICACIONLookup'">
			<app-data-lookup
				[model]="mTIPO_APLICACION"
				[(value)]="model.TIPO_APLICACION"
				[selectedRowKeys]="selectedLookUpLista"
				[readOnly]="readOnly"
			>
			</app-data-lookup>
		</div>
	</dx-form>
  <table class='border'>
    <tbody>
        <tr>
            <td>
              <div id='gridContainer2'>
                <div class="form">
                  <div class="dx-fieldset">
                    <div class="dx-field">
                      <dx-data-grid
                        [dataSource]="mGEN_RUBRO_IMPUESTO"
                        [columnAutoWidth]="false"
                        [showBorders]="true"
                        [showColumnLines]="true"
                        [showRowLines]="true"
                        [rowAlternationEnabled]="true"
                        [hoverStateEnabled]="true"
                        [allowColumnResizing]="true"
                        [columnResizingMode]="'widget'"
                        [repaintChangesOnly]="true"
                        [height]="'100%'"
                        [width]="'100%'"
                        keyExpr="CORR_IMPUESTO"
                        (onInitNewRow)="gDataRubroImpuestoInitNewRow($event)"
                        (onRowInserting)="gDataRubroImpuestoRowInserting($event)"
                        (onRowUpdated)="gDataRubroImpuestoRowUpdated($event)"
                        (onRowRemoving)="gDataRubroImpuestoRowRemoving($event)"
                        (onRowValidating)="gDataRubroImpuestoRowValidating($event)"
                      >
                        <dxo-editing
                          mode="cell"
                          [refreshMode]="'reshape'"
                          [allowAdding]="!readOnly"
                          [allowUpdating]="!readOnly"
                          [allowDeleting]="!readOnly"
                          [useIcons]="true"
                        >
                          <dxo-popup title="Impuesto" [showTitle]="true" [width]="700" [height]="350"></dxo-popup>
                          <dxo-form [colCount]="8" showValidationSummary="true">
                            <dxi-item dataField="CORR_IMPUESTO" [colSpan]="8" [label]="{ text: 'Impuesto', alignment: 'right' }">
                            </dxi-item>
                            <dxi-item dataField="IMPUESTO_INCLUIDO" [colSpan]="8" [label]="{ text: 'Incluido', alignment: 'right' }" [editorType]="'dxCheckBox'"></dxi-item>
                          </dxo-form>
                        </dxo-editing>
                        <dxo-toolbar>
                          <dxi-item name="addRowButton" location="before"></dxi-item>
                          <dxi-item name="exportButton" location="before"></dxi-item>
                          <dxi-item name="searchPanel" location="before"></dxi-item>
                        </dxo-toolbar>
                        <dxo-keyboard-navigation [editOnKeyPress]="true"></dxo-keyboard-navigation>
                        <dxo-load-panel [enabled]="false"></dxo-load-panel>
                        <dxo-search-panel [visible]="true"></dxo-search-panel>
                        <dxo-export [enabled]="true" fileName="Impuestos"></dxo-export>
                        <dxi-column type="buttons" [width]="'40'">
                          <dxi-button name="delete" [visible]="!readOnly"></dxi-button>
                        </dxi-column>
                        <dxi-column
                          dataField="CORR_IMPUESTO"
                          caption="Impuestos"
                          [dataType]="'number'"
                          [width]="'120'"
                          editCellTemplate="CORR_IMPUESTOLookup"
                        >
                          <dxo-lookup
                            [dataSource]="mCORR_IMPUESTO"
                            valueExpr="CORR_RUBRO"
                            displayExpr="NOMBRE_RUBRO"
                          ></dxo-lookup>
                        </dxi-column>
                        <div *dxTemplate="let cellInfo of 'CORR_IMPUESTOLookup'">
                          <app-data-lookup
                            [setValue]="cellInfo.setValue"
                            [model]="mCORR_IMPUESTO"
                            [valueExpr]="'CORR_RUBRO'"
                            [displayExpr]="'NOMBRE_RUBRO'"
                            [(value)]="cellInfo.value"
                            [selectedRowKeys]="selectedLookUpCORR_IMPUESTO"
                            [readOnly]="readOnly"
                          >
                          </app-data-lookup>
                        </div>
                        <dxi-column
                          dataField="IMPUESTO_INCLUIDO"
                          caption="Incluido"
                          [dataType]="'boolean'"
                          [width]="'35%'"
                        ></dxi-column>
                        <dxo-summary>
                          <dxi-total-item
                            column="CORR_IMPUESTO"
                            summaryType="count"
                            valueFormat="#,##0"
                            displayFormat="Cant: {0}"
                          >
                          </dxi-total-item>
                        </dxo-summary>
                      </dx-data-grid>
                    </div>
                  </div>
                </div>
              </div>
            </td>
            <td>
              <div id='gridContainer'>
                <div class="form">
                  <div class="dx-fieldset">
                    <div class="dx-field">
                      <dx-data-grid
                        [dataSource]="mGEN_RUBRO_SUMA"
                        [columnAutoWidth]="false"
                        [showBorders]="true"
                        [showColumnLines]="true"
                        [showRowLines]="true"
                        [rowAlternationEnabled]="true"
                        [hoverStateEnabled]="true"
                        [allowColumnResizing]="true"
                        [columnResizingMode]="'widget'"
                        [repaintChangesOnly]="true"
                        [height]="'100%'"
                        [width]="'100%'"
                        keyExpr="CORR_SUMA"
                        (onInitNewRow)="gDataRubroSumaInitNewRow($event)"
                        (onRowInserting)="gDataRubroSumaRowInserting($event)"
                        (onRowUpdated)="gDataRubroSumaRowUpdated($event)"
                        (onRowRemoving)="gDataRubroSumaRowRemoving($event)"
                        (onRowValidating)="gDataRubroSumaRowValidating($event)"
                      >
                        <dxo-editing
                          mode="cell"
                          [refreshMode]="'reshape'"
                          [allowAdding]="!readOnly"
                          [allowUpdating]="!readOnly"
                          [allowDeleting]="!readOnly"
                          [useIcons]="true"
                        >
                          <dxo-popup title="Sumandos" [showTitle]="true" [width]="700" [height]="350"></dxo-popup>
                          <dxo-form [colCount]="8" showValidationSummary="true">
                            <dxi-item dataField="CORR_SUMA"[colSpan]="8" [label]="{ text: 'Sumandos', alignment: 'right' }">
                            </dxi-item>>
                          </dxo-form>
                        </dxo-editing>
                        <dxo-toolbar>
                          <dxi-item name="addRowButton" location="before"></dxi-item>
                          <dxi-item name="exportButton" location="before"></dxi-item>
                          <dxi-item name="searchPanel" location="before"></dxi-item>
                        </dxo-toolbar>
                        <dxo-keyboard-navigation [editOnKeyPress]="true"></dxo-keyboard-navigation>
                        <dxo-load-panel [enabled]="false"></dxo-load-panel>
                        <dxo-search-panel [visible]="true"></dxo-search-panel>
                        <dxo-export [enabled]="true" fileName="Detalle Sumandos"></dxo-export>
                        <dxi-column type="buttons" [width]="'40'">
                          <dxi-button name="delete" [visible]="!readOnly"></dxi-button>
                        </dxi-column>
                        <dxi-column
                          dataField="CORR_SUMA"
                          caption="Sumandos"
                          [dataType]="'number'"
                          [width]="'120'"
                          editCellTemplate="CORR_RUBROLookup"
                        >
                          <dxo-lookup
                            [dataSource]="mCORR_RUBRO"
                            valueExpr="CORR_RUBRO"
                            displayExpr="NOMBRE_RUBRO"
                          ></dxo-lookup>
                        </dxi-column>
                        <div *dxTemplate="let cellInfo of 'CORR_RUBROLookup'">
                          <app-data-lookup
                            [setValue]="cellInfo.setValue"
                            [model]="mCORR_RUBRO"
                            [valueExpr]="'CORR_RUBRO'"
                            [displayExpr]="'NOMBRE_RUBRO'"
                            [(value)]="cellInfo.value"
                            [selectedRowKeys]="selectedLookUpCORR_RUBRO"
                            [readOnly]="readOnly"
                          >
                          </app-data-lookup>
                        </div>
                        <dxo-summary>
                          <dxi-total-item
                            column="CORR_SUMA"
                            summaryType="count"
                            valueFormat="#,##0"
                            displayFormat="Cant: {0}"
                          >
                          </dxi-total-item>
                        </dxo-summary>
                      </dx-data-grid>
                    </div>
                  </div>
                </div>
              </div>
            </td>
        </tr>
    </tbody>
</table>
</div>
<app-data-grid-mtto
	[isBrowse]="isBrowse()"
	[models]="models"
	[columns]="columns"
	[summary]="summary"
	[keyExpr]="'CORR_RUBRO'"
	[permiteEditar]="getPermiteEditar"
	[permiteDele]="getPermiteDele"
	(rowDblClick)="rowDblClick($event)"
	(rowRemoving)="rowRemoving($event)"
	(focusedRowChanged)="focusedRowChanged($event)"
	(editClick)="editarClick($event)"
>
</app-data-grid-mtto>
<dx-load-panel
	#loadPanel
	shadingColor="rgba(0,0,0,0.4)"
	[position]="{ my: 'center', at: 'center', of: '#LoadPanel' }"
	[(visible)]="loadingVisible"
	[showIndicator]="true"
	[showPane]="true"
	[shading]="true"
	(onShown)="(loadingVisible)"
>
</dx-load-panel>
