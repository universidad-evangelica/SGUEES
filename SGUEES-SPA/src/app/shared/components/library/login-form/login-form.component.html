<div id="page-login-index">
  <div class="login-container">
    <div class="card" role="main">
      <div class="card-header">
        <img id="logo-uees" src="assets/img/logo_uees_sin_fondo.png" alt="UEES" />
      </div>

      <div class="portal-system">SISTEMA DE GESTIÓN UNIVERSITARIA UEES</div>
      <div id="login-title">Iniciar Sesión</div>

      <form class="card-body" (submit)="onSubmit($event)">
        <div class="form-group">
          <input
            id="txtUsuario"
            class="form-control"
            placeholder="Usuario"
            autocomplete="username"
            [(ngModel)]="formData.usuario"
            name="usuario"
            [disabled]="loading"
          />
        </div>

        <div class="form-group password-wrapper">
          <input
            id="txtClave"
            class="form-control"
            placeholder="Contraseña"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            [(ngModel)]="formData.password"
            name="password"
            [disabled]="loading"
          />
          <span
            id="btnTogglePassword"
            class="password-toggle"
            [title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            role="button"
            tabindex="0"
            (click)="showPassword = !showPassword"
            (keypress)="$event.key === 'Enter' && (showPassword = !showPassword)"
          >
            {{ showPassword ? '🙈' : '👁' }}
          </span>
        </div>

        <div class="form-group">
          <button
            id="btnIngresar"
            class="btn-login"
            type="submit"
            [disabled]="loading"
          >
            {{ loading ? 'Ingresando...' : 'Ingresar' }}
          </button>
        </div>

        <a class="forgot-link" [routerLink]="resetLink">¿Olvidaste tu contraseña?</a>

        <div id="lblInfo" *ngIf="errorMessage">{{ errorMessage }}</div>
      </form>
    </div>
  </div>
</div>

<!-- Modal de cambio de contraseña obligatorio -->
<app-change-password-modal
  [visible]="showChangePasswordModal"
  [loginSistema]="loginSistemaForPasswordChange"
  [changeReason]="passwordChangeReason"
  (onPasswordChanged)="onPasswordChanged()">
</app-change-password-modal>
